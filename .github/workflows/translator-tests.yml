name: Translator Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.runner || matrix.OS }}
    timeout-minutes: 45
    strategy:
      matrix:
        component:
          [
            "directx",
            "metal",
            "GLSL",
            "slang",
            "SPIRV",
            "mojo",
            "rust",
            "CUDA",
            "hip",
            "general",
          ]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        OS: [ubuntu-latest, windows-latest, macOS-latest]
        include:
          - python-version: "3.8"
            OS: windows-latest
            runner: windows-2022
      fail-fast: false
      max-parallel: 24

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v5
        continue-on-error: true
        with:
          python-version: ${{ matrix.python-version }}

      - name: Classify Python setup failure
        if: steps.setup_python.outcome == 'failure'
        shell: bash
        run: |
          echo "::error title=Python setup failed::actions/setup-python failed before project dependencies or tests ran (workflow=Translator Tests, component=${{ matrix.component }}, python=${{ matrix.python-version }}, os=${{ matrix.OS }}). Treat this as CI setup infrastructure unless a later dependency or pytest step executed."
          {
            echo "## Matrix Setup Failure"
            echo "- Workflow: Translator Tests"
            echo "- Component: ${{ matrix.component }}"
            echo "- Python: ${{ matrix.python-version }}"
            echo "- OS: ${{ matrix.OS }}"
            echo "- Stage: actions/setup-python"
            echo "- Classification: setup infrastructure before project tests"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: Run translator tests
        id: run_translator_tests
        shell: bash
        run: |
          mkdir -p support/generated
          if [ "${{ matrix.component }}" == "general" ]; then
            python -m pytest tests/test_translator --ignore=tests/test_translator/test_codegen \
              --junitxml support/generated/translator-tests-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}.xml
          else
            python -m pytest tests/test_translator/test_codegen/test_${{ matrix.component }}_codegen.py \
              --junitxml support/generated/translator-tests-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}.xml
          fi

      - name: Write translator test failure summary
        if: failure() && steps.run_translator_tests.outcome == 'failure'
        shell: bash
        run: |
          python tools/pytest_failure_summary.py \
            support/generated/translator-tests-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}.xml \
            --json-output support/generated/translator-tests-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}-failure-summary.json \
            --markdown-output support/generated/translator-tests-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}-failure-summary.md
          cat support/generated/translator-tests-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}-failure-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload translator test failure summary
        if: failure() && steps.run_translator_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: translator-tests-failure-summary-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}
          path: |
            support/generated/translator-tests-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}.xml
            support/generated/translator-tests-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}-failure-summary.json
            support/generated/translator-tests-${{ matrix.component }}-${{ matrix.python-version }}-${{ matrix.OS }}-failure-summary.md
          if-no-files-found: ignore
          retention-days: 30

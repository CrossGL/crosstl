name: Complete Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt

      - name: Run complete test suite
        run: python -m pytest tests --durations=25

  shader-validators:
    name: Shader Validators (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install optional shader validators
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools

      - name: Install GLSL validator (macOS)
        if: runner.os == 'macOS'
        run: brew install glslang

      - name: Install GLSL validator (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install vulkan-sdk --version=1.4.341 -y --no-progress
          $sdkRoot = Get-ChildItem "C:\VulkanSDK" -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if ($null -eq $sdkRoot) {
            throw "Vulkan SDK install directory was not found"
          }
          Join-Path $sdkRoot.FullName "Bin" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install DirectX Shader Compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL -o "$RUNNER_TEMP/dxc.tar.gz" \
            https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602/linux_dxc_2026_02_20.x86_64.tar.gz
          mkdir -p "$RUNNER_TEMP/dxc"
          tar -xzf "$RUNNER_TEMP/dxc.tar.gz" -C "$RUNNER_TEMP/dxc"
          echo "$RUNNER_TEMP/dxc/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=$RUNNER_TEMP/dxc/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Install DirectX Shader Compiler (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "dxc.zip"
          $dxcRoot = Join-Path $env:RUNNER_TEMP "dxc"
          Invoke-WebRequest `
            -Uri "https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602/dxc_2026_02_20.zip" `
            -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $dxcRoot -Force
          Join-Path $dxcRoot "bin\x64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt

      - name: Run external shader validator tests
        run: >
          python -m pytest
          tests/test_translator/test_codegen/test_external_shader_validators.py
          -rs

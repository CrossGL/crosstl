name: Complete Test Suite

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt
          python -m pip install pytest-xdist

      - name: Run complete test suite
        run: |
          mkdir -p support/generated
          python -m pytest tests --durations=25 -n auto --junitxml support/generated/full-tests-pytest.xml

      - name: Write complete test failure summary
        if: always()
        run: |
          python tools/pytest_failure_summary.py \
            support/generated/full-tests-pytest.xml \
            --json-output support/generated/full-tests-failure-summary.json \
            --markdown-output support/generated/full-tests-failure-summary.md
          cat support/generated/full-tests-failure-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload complete test failure summary
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: full-test-failure-summary
          path: |
            support/generated/full-tests-pytest.xml
            support/generated/full-tests-failure-summary.json
            support/generated/full-tests-failure-summary.md
          if-no-files-found: ignore
          retention-days: 30

  shader-validators:
    name: Shader Validators (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install optional shader validators
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools spirv-tools

      - name: Install GLSL validator (macOS)
        if: runner.os == 'macOS'
        run: brew install glslang

      - name: Install GLSL validator (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ProgressPreference = "SilentlyContinue"
          $vulkanSdkVersion = "1.4.341.1"
          $maxAttempts = 3
          $chocoInstalled = $false
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            choco install vulkan-sdk --version=1.4.341 -y --no-progress
            if ($LASTEXITCODE -eq 0) {
              $chocoInstalled = $true
              break
            }
            if ($attempt -eq $maxAttempts) {
              break
            }
            Write-Warning "Chocolatey Vulkan SDK install failed on attempt $attempt; retrying."
            Start-Sleep -Seconds (20 * $attempt)
          }
          if (-not $chocoInstalled) {
            $installer = Join-Path $env:RUNNER_TEMP "vulkansdk-windows-X64-$vulkanSdkVersion.exe"
            $installRoot = "C:\VulkanSDK\$vulkanSdkVersion"
            $sdkUri = "https://sdk.lunarg.com/sdk/download/$vulkanSdkVersion/windows/vulkansdk-windows-X64-$vulkanSdkVersion.exe"
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              try {
                Invoke-WebRequest -Uri $sdkUri -OutFile $installer
                & $installer --root $installRoot --accept-licenses --default-answer --confirm-command install copy_only=1
                if ($LASTEXITCODE -ne 0) {
                  throw "Vulkan SDK installer exited with code $LASTEXITCODE"
                }
                break
              } catch {
                if ($attempt -eq $maxAttempts) {
                  throw
                }
                Write-Warning "Direct Vulkan SDK install failed on attempt $attempt; retrying."
                Start-Sleep -Seconds (20 * $attempt)
              }
            }
          }
          $sdkRoot = Get-ChildItem "C:\VulkanSDK" -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if ($null -eq $sdkRoot) {
            throw "Vulkan SDK install directory was not found"
          }
          Join-Path $sdkRoot.FullName "Bin" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install DirectX Shader Compiler (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-dxc

      - name: Install DirectX Shader Compiler (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "dxc.zip"
          $dxcRoot = Join-Path $env:RUNNER_TEMP "dxc"
          $dxcUri = "https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602/dxc_2026_02_20.zip"
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              Invoke-WebRequest -Uri $dxcUri -OutFile $archive
              break
            } catch {
              if ($attempt -eq 5) {
                throw
              }
              Write-Warning "DXC download failed on attempt $attempt; retrying."
              Start-Sleep -Seconds (10 * $attempt)
            }
          }
          Expand-Archive -Path $archive -DestinationPath $dxcRoot -Force
          Join-Path $dxcRoot "bin\x64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt

      - name: Run external shader validator tests
        shell: bash
        run: |
          mkdir -p support/generated
          python -m pytest \
            tests/test_translator/test_codegen/test_external_shader_validators.py \
            --junitxml support/generated/shader-validators-pytest.xml \
            -rs

      - name: Write shader validator failure summary
        if: always()
        shell: bash
        run: |
          python tools/pytest_failure_summary.py \
            support/generated/shader-validators-pytest.xml \
            --json-output support/generated/shader-validators-failure-summary.json \
            --markdown-output support/generated/shader-validators-failure-summary.md
          cat support/generated/shader-validators-failure-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload shader validator failure summary
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: shader-validator-failure-summary-${{ matrix.os }}
          path: |
            support/generated/shader-validators-pytest.xml
            support/generated/shader-validators-failure-summary.json
            support/generated/shader-validators-failure-summary.md
          if-no-files-found: ignore
          retention-days: 30

  compiler-smoke-linux:
    name: Compiler Smoke (Linux CUDA/DXC/SPIR-V/Slang)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CUDA_VERSION: "13.2.0"
      SLANG_VERSION: v2026.9.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GLSL and SPIR-V tools
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools spirv-tools

      - name: Install DirectX Shader Compiler
        uses: ./.github/actions/install-linux-dxc

      - name: Install Slang compiler
        run: |
          set -euo pipefail
          version="${SLANG_VERSION#v}"
          archive="slang-${version}-linux-x86_64-glibc-2.27.tar.gz"
          curl -fsSL -o "$RUNNER_TEMP/slang.tar.gz" \
            "https://github.com/shader-slang/slang/releases/download/${SLANG_VERSION}/${archive}"
          mkdir -p "$RUNNER_TEMP/slang"
          tar -xzf "$RUNNER_TEMP/slang.tar.gz" -C "$RUNNER_TEMP/slang"
          slangc_path="$(find "$RUNNER_TEMP/slang" -type f -name slangc -perm -111 -print -quit)"
          if [ -z "$slangc_path" ]; then
            echo "slangc was not found in the extracted Slang archive" >&2
            find "$RUNNER_TEMP/slang" -maxdepth 3 -type f | sort >&2
            exit 1
          fi
          slang_bin="$(dirname "$slangc_path")"
          slang_lib="$(find "$RUNNER_TEMP/slang" -type d -name lib -print -quit)"
          echo "$slang_bin" >> "$GITHUB_PATH"
          if [ -n "$slang_lib" ]; then
            echo "LD_LIBRARY_PATH=$slang_lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          fi

      - name: Install CUDA compiler
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart-dev"]'
          log-file-suffix: compiler-smoke-linux.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt
          python -m pip install pytest-xdist

      - name: Verify compiler toolchain is active
        run: |
          set -euo pipefail
          for tool in glslangValidator spirv-as spirv-val dxc slangc nvcc; do
            command -v "$tool"
          done
          glslangValidator --version
          spirv-as --version
          spirv-val --version
          dxc --version
          slangc -version || slangc --version
          nvcc --version

      - name: Run compiler toolchain smoke tests
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"

          cat > "$tmp/smoke.hlsl" <<'HLSL'
          struct PSInput {
            float4 position : SV_Position;
          };

          float4 PSMain(PSInput input) : SV_Target {
            return input.position;
          }
          HLSL
          dxc -T ps_6_0 -E PSMain "$tmp/smoke.hlsl" -Fo "$tmp/smoke.dxil"

          cat > "$tmp/smoke.slang" <<'SLANG'
          [shader("compute")]
          [numthreads(1, 1, 1)]
          void main(uint3 tid : SV_DispatchThreadID) {
          }
          SLANG
          slangc -target hlsl -entry main -stage compute "$tmp/smoke.slang" -o "$tmp/smoke.slang.hlsl"

          cat > "$tmp/smoke.comp" <<'GLSL'
          #version 450
          layout(local_size_x = 1, local_size_y = 1, local_size_z = 1) in;

          void main() {
          }
          GLSL
          glslangValidator -V "$tmp/smoke.comp" -o "$tmp/smoke.spv"
          spirv-val "$tmp/smoke.spv"

          cat > "$tmp/smoke.spvasm" <<'SPV'
          OpCapability Shader
          OpMemoryModel Logical GLSL450
          OpEntryPoint GLCompute %main "main"
          OpExecutionMode %main LocalSize 1 1 1
          %void = OpTypeVoid
          %fn = OpTypeFunction %void
          %main = OpFunction %void None %fn
          %entry = OpLabel
          OpReturn
          OpFunctionEnd
          SPV
          spirv-as "$tmp/smoke.spvasm" -o "$tmp/smoke-as.spv"
          spirv-val "$tmp/smoke-as.spv"

          cat > "$tmp/smoke.cu" <<'CUDA'
          #include <cuda_runtime.h>

          __global__ void cgl_smoke_kernel() {
          }
          CUDA
          nvcc -std=c++17 -c "$tmp/smoke.cu" -o "$tmp/smoke_cuda.o"

      - name: Run external shader validator tests
        run: |
          mkdir -p support/generated
          python -m pytest -q -n auto \
            tests/test_translator/test_codegen/test_external_shader_validators.py \
            --junitxml support/generated/compiler-smoke-linux-pytest.xml \
            -rs

      - name: Write compiler smoke failure summary
        if: always()
        run: |
          python tools/pytest_failure_summary.py \
            support/generated/compiler-smoke-linux-pytest.xml \
            --json-output support/generated/compiler-smoke-linux-failure-summary.json \
            --markdown-output support/generated/compiler-smoke-linux-failure-summary.md
          cat support/generated/compiler-smoke-linux-failure-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload compiler smoke failure summary
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: compiler-smoke-linux-failure-summary
          path: |
            support/generated/compiler-smoke-linux-pytest.xml
            support/generated/compiler-smoke-linux-failure-summary.json
            support/generated/compiler-smoke-linux-failure-summary.md
          if-no-files-found: ignore
          retention-days: 30

  compiler-smoke-macos:
    name: Compiler Smoke (macOS Metal)
    runs-on: macOS-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GLSL validator
        run: brew install glslang

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt
          python -m pip install pytest-xdist

      - name: Verify Metal toolchain is active
        run: |
          xcrun -sdk macosx -f metal
          xcrun -sdk macosx metal -v
          command -v glslangValidator
          glslangValidator --version

      - name: Run Metal compiler smoke tests
        run: |
          mkdir -p support/generated
          python -m pytest -q -n auto \
            tests/test_translator/test_codegen/test_external_shader_validators.py \
            tests/test_translator/test_codegen/test_shader_validation.py \
            tests/test_translator/test_codegen/test_metal_codegen.py \
            -k "metal" \
            --junitxml support/generated/compiler-smoke-macos-pytest.xml \
            -rs

      - name: Write Metal compiler smoke failure summary
        if: always()
        run: |
          python tools/pytest_failure_summary.py \
            support/generated/compiler-smoke-macos-pytest.xml \
            --json-output support/generated/compiler-smoke-macos-failure-summary.json \
            --markdown-output support/generated/compiler-smoke-macos-failure-summary.md
          cat support/generated/compiler-smoke-macos-failure-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Metal compiler smoke failure summary
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: compiler-smoke-macos-failure-summary
          path: |
            support/generated/compiler-smoke-macos-pytest.xml
            support/generated/compiler-smoke-macos-failure-summary.json
            support/generated/compiler-smoke-macos-failure-summary.md
          if-no-files-found: ignore
          retention-days: 30

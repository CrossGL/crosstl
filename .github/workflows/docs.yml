name: Documentation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Doxygen
        run: |
          mapfile -t runner_apt_sources < <(
            grep -rl "packages.microsoft.com" /etc/apt/sources.list.d 2>/dev/null || true
          )

          if ((${#runner_apt_sources[@]})); then
            printf 'Removing optional hosted-runner apt sources before apt update:\n'
            printf '  %s\n' "${runner_apt_sources[@]}"
            sudo rm -f "${runner_apt_sources[@]}"
          fi

          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build Doxygen XML
        run: make -C docs doxygen

      - name: Build Sphinx HTML
        run: make -C docs html

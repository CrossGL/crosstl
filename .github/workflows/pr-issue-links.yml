name: PR Issue Links

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-issue-links-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync:
    name: Assign closing-keyword issues
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync PR issue links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python tools/sync_pr_issue_links.py
          --repo "$GITHUB_REPOSITORY"
          --event-path "$GITHUB_EVENT_PATH"
          --sync-support-closures
          --sync-support-references
          --enforce-support-traceability
          --summary-output support/generated/pr-issue-link-summary.json

      - name: Validate PR issue link summary
        if: always()
        run: >
          python tools/sync_pr_issue_links.py
          --validate-summary support/generated/pr-issue-link-summary.json

      - name: Upload PR issue link summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-issue-link-summary
          path: support/generated/pr-issue-link-summary.json
          if-no-files-found: warn

name: Support Issue Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  workflow_run:
    workflows:
      - Complete Test Suite
      - Backend Tests
      - Translator Tests
    types:
      - completed
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/backend-tests.yml"
      - ".github/workflows/docs.yml"
      - ".github/workflows/examples-test.yml"
      - ".github/workflows/full-tests.yml"
      - ".github/workflows/issue_assign.yml"
      - ".github/workflows/support-matrix.yml"
      - ".github/workflows/support-issue-sync.yml"
      - ".github/workflows/stale-prs.yml"
      - ".github/workflows/translator-tests.yml"
      - ".github/workflows/pr-issue-links.yml"
      - "crosstl/backend/**"
      - "crosstl/translator/ast.py"
      - "crosstl/translator/codegen/**"
      - "crosstl/translator/lexer.py"
      - "crosstl/translator/parser.py"
      - "crosstl/translator/validation.py"
      - "docs/source/support-matrix.rst"
      - "examples/test.py"
      - "support/**"
      - "tools/ci_coverage.py"
      - "tools/pytest_failure_summary.py"
      - "tools/support_ci_summary.py"
      - "tools/support_matrix.py"
      - "tools/support_signals.py"
      - "tools/sync_support_issues.py"
      - "tools/sync_pr_issue_links.py"
      - "tests/test_backend/**"
      - "tests/test_examples_test_script.py"
      - "tests/test_translator/test_ast_ir_contracts.py"
      - "tests/test_translator/test_backend_contract.py"
      - "tests/test_translator/test_codegen/**"
      - "tests/test_translator/test_frontend_*.py"
      - "tests/test_translator/test_ir_legacy_alias_contracts.py"
      - "tests/test_translator/test_lexer.py"
      - "tests/test_translator/test_parser.py"
      - "tests/test_translator/test_shader_validation.py"
      - "tests/test_translator/test_translation_pipeline.py"
      - "tests/test_ci_workflows.py"
      - "tests/test_support_matrix.py"
      - "tests/test_support_signals.py"
      - "tests/test_support_ci_summary.py"
      - "tests/test_support_issue_sync.py"
      - "tests/test_tool_cli.py"
      - "tests/test_pr_issue_links.py"
      - "tests/test_pytest_failure_summary.py"

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: support-issue-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync support matrix issues
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python -m pip install pytest pypdf

      - name: Validate support matrix artifacts
        run: python tools/support_matrix.py check --output support/generated/support-matrix-check.json

      - name: Audit support matrix evidence
        if: always()
        run: >
          python tools/support_matrix.py evidence
          --status supported
          --evidence missing
          --fail-on-missing
          --output support/generated/support-evidence-check.json

      - name: Upload support matrix check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: support-matrix-check-report
          path: |
            support/generated/support-matrix-check.json
            support/generated/support-evidence-check.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Write CI coverage report
        run: |
          python tools/ci_coverage.py report --output support/generated/ci-coverage-report.json
          python tools/ci_coverage.py summary --output support/generated/ci-coverage-report.md
          cat support/generated/ci-coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Write base CI coverage report
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
          rm -rf "$RUNNER_TEMP/ci-coverage-base"
          git worktree add --detach "$RUNNER_TEMP/ci-coverage-base" FETCH_HEAD
          python tools/ci_coverage.py --root "$RUNNER_TEMP/ci-coverage-base" report \
            --output "$GITHUB_WORKSPACE/support/generated/ci-coverage-base-report.json"

      - name: Compare CI coverage with base
        if: github.event_name == 'pull_request'
        run: >
          python tools/ci_coverage.py compare
          --baseline support/generated/ci-coverage-base-report.json
          --current support/generated/ci-coverage-report.json
          --output support/generated/ci-coverage-comparison.json
          --fail-on-shrink

      - name: Upload CI coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-coverage-report
          path: |
            support/generated/ci-coverage-report.json
            support/generated/ci-coverage-report.md
            support/generated/ci-coverage-base-report.json
            support/generated/ci-coverage-comparison.json
          retention-days: 30

      - name: Validate CI coverage policy
        run: python tools/ci_coverage.py check

      - name: Download test failure summaries
        if: github.event_name == 'workflow_run'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: "*failure-summary*"
          path: support/generated/pytest-failures
          merge-multiple: false

      - name: Write clean Complete Test Suite failure summary
        if: github.event_name == 'workflow_run' && github.event.workflow_run.name == 'Complete Test Suite' && github.event.workflow_run.conclusion == 'success'
        run: |
          mkdir -p support/generated/pytest-failures/clean-workflow
          python tools/pytest_failure_summary.py \
            --clean-workflow "${{ github.event.workflow_run.name }}" \
            --clean-run-id "${{ github.event.workflow_run.id }}" \
            --clean-conclusion "${{ github.event.workflow_run.conclusion }}" \
            --clean-head-sha "${{ github.event.workflow_run.head_sha }}" \
            --json-output support/generated/pytest-failures/clean-workflow/clean-workflow-failure-summary.json \
            --markdown-output support/generated/pytest-failures/clean-workflow/clean-workflow-failure-summary.md

      - name: Probe backend documentation signals
        if: github.event_name != 'pull_request'
        run: python tools/support_signals.py docs --output support/generated/backend-docs-report.json

      - name: Extract generated support signals
        run: |
          docs_args=()
          if [ -f support/generated/backend-docs-report.json ]; then
            docs_args=(--docs-report support/generated/backend-docs-report.json)
          fi
          failure_args=()
          if [ -d support/generated/pytest-failures ]; then
            while IFS= read -r report; do
              failure_args+=(--pytest-failure-summary "$report")
            done < <(find support/generated/pytest-failures -type f -name "*-failure-summary.json" | sort)
          fi
          python tools/support_signals.py extract \
            "${docs_args[@]}" \
            "${failure_args[@]}" \
            --output support/generated/support-signals.json

      - name: Choose pytest failure closure mode
        id: pytest_failure_closure
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.name }}" != "Complete Test Suite" ]; then
            echo "args=--preserve-pytest-failure-issues" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload support signal reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: support-signal-reports
          path: |
            support/generated/backend-docs-report.json
            support/generated/pytest-failures/**
            support/generated/support-signals.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Test support automation planners
        run: >
          python -m pytest -q
          tests/test_support_matrix.py
          tests/test_support_signals.py
          tests/test_support_ci_summary.py
          tests/test_support_issue_sync.py
          tests/test_pr_issue_links.py
          tests/test_pytest_failure_summary.py
          tests/test_ci_workflows.py
          tests/test_tool_cli.py
          tests/test_examples_test_script.py

      - name: Dry-run issue sync
        if: github.event_name == 'pull_request'
        run: >
          python tools/sync_support_issues.py
          --repo "$GITHUB_REPOSITORY"
          --signals support/generated/support-signals.json
          --matrix-check-report support/generated/support-matrix-check.json
          --throttle-seconds 2
          --max-retries 6
          --retry-base-seconds 60
          --retry-max-seconds 600
          --min-desired-issues 10
          --plan-output support/generated/support-issue-plan.json
          --dry-run

      - name: Plan GitHub issue sync
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python tools/sync_support_issues.py
          --repo "$GITHUB_REPOSITORY"
          --signals support/generated/support-signals.json
          --matrix-check-report support/generated/support-matrix-check.json
          --throttle-seconds 2
          --max-retries 6
          --retry-base-seconds 60
          --retry-max-seconds 600
          --min-desired-issues 10
          --inspect-existing
          --planned-action-budget-mode fail
          --max-planned-created 300
          --max-planned-updated 300
          --max-planned-closed 500
          --max-planned-attached 300
          --max-planned-total 600
          --max-planned-stale-parent-closures 0
          --max-planned-stale-backlog-closures 250
          --max-planned-stale-extracted-closures 250
          --max-planned-duplicate-marker-closures 25
          ${{ steps.pytest_failure_closure.outputs.args }}
          --plan-output support/generated/support-issue-plan.json
          --dry-run

      - name: Sync GitHub issues
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python tools/sync_support_issues.py
          --repo "$GITHUB_REPOSITORY"
          --signals support/generated/support-signals.json
          --matrix-check-report support/generated/support-matrix-check.json
          --throttle-seconds 2
          --max-retries 6
          --retry-base-seconds 60
          --retry-max-seconds 600
          --min-desired-issues 10
          --inspect-existing
          --planned-action-budget-mode fail
          --max-planned-created 300
          --max-planned-updated 300
          --max-planned-closed 500
          --max-planned-attached 300
          --max-planned-total 600
          --max-planned-stale-parent-closures 0
          --max-planned-stale-backlog-closures 250
          --max-planned-stale-extracted-closures 250
          --max-planned-duplicate-marker-closures 25
          ${{ steps.pytest_failure_closure.outputs.args }}
          --plan-output support/generated/support-issue-plan.json
          --sync-summary-output support/generated/support-issue-sync-summary.json

      - name: Write support automation summary
        if: always()
        run: |
          python tools/support_ci_summary.py \
            --matrix-check support/generated/support-matrix-check.json \
            --support-evidence support/generated/support-evidence-check.json \
            --issue-plan support/generated/support-issue-plan.json \
            --sync-summary support/generated/support-issue-sync-summary.json \
            --output support/generated/support-issue-ci-summary.md \
            --metrics-output support/generated/support-issue-sync-metrics.json \
            --step-summary "$GITHUB_STEP_SUMMARY" \
            --github-annotations \
            --fail-on-attention

      - name: Upload support issue sync reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: support-issue-sync-reports
          path: |
            support/generated/support-matrix-check.json
            support/generated/support-evidence-check.json
            support/generated/support-issue-plan.json
            support/generated/support-issue-sync-summary.json
            support/generated/support-issue-sync-metrics.json
            support/generated/support-issue-ci-summary.md
          if-no-files-found: ignore
          retention-days: 30

name: Support Issue Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/support-issue-sync.yml"
      - ".github/workflows/pr-issue-links.yml"
      - "support/**"
      - "tools/support_matrix.py"
      - "tools/sync_support_issues.py"
      - "tools/sync_pr_issue_links.py"
      - "tests/test_support_issue_sync.py"
      - "tests/test_pr_issue_links.py"

permissions:
  contents: read
  issues: write

concurrency:
  group: support-issue-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync support matrix issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Validate support matrix artifacts
        run: python tools/support_matrix.py check

      - name: Test support automation planners
        run: python -m pytest -q tests/test_support_issue_sync.py tests/test_pr_issue_links.py

      - name: Dry-run issue sync
        if: github.event_name == 'pull_request'
        run: >
          python tools/sync_support_issues.py
          --repo "$GITHUB_REPOSITORY"
          --dry-run

      - name: Sync GitHub issues
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python tools/sync_support_issues.py
          --repo "$GITHUB_REPOSITORY"

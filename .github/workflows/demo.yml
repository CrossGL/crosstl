name: Open-Source Porting Demo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  demo:
    name: Demo (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux shader validators
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools spirv-tools

      - name: Install macOS shader validators
        if: runner.os == 'macOS'
        run: brew install glslang spirv-tools

      - name: Install DirectX Shader Compiler
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          $dxcUrl = "https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602.24/dxc_2026_05_27.zip"
          $zip = Join-Path $env:RUNNER_TEMP (Split-Path $dxcUrl -Leaf)
          $dest = Join-Path $env:RUNNER_TEMP "dxc"
          Invoke-WebRequest -Uri $dxcUrl -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest
          $dxc = Get-ChildItem -Path $dest -Recurse -Filter dxc.exe |
            Where-Object { $_.FullName -match "\\bin\\x64\\" } |
            Select-Object -First 1
          if (-not $dxc) {
            $dxc = Get-ChildItem -Path $dest -Recurse -Filter dxc.exe |
              Select-Object -First 1
          }
          if (-not $dxc) {
            throw "dxc.exe not found in release archive."
          }
          $dxc.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install CrossTL
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
        shell: bash

      - name: Verify checked-in demo artifacts
        run: |
          python demos/open-source-porting/run_demo.py \
            --check \
            --reports-dir support/generated/demo-reports
        shell: bash

      - name: Linux OpenGL smoke checks
        if: runner.os == 'Linux'
        run: |
          python demos/open-source-porting/run_demo.py \
            --check \
            --run-toolchains \
            --require-toolchain-runs \
            $(python demos/open-source-porting/run_demo.py --emit-case-args opengl) \
            --target opengl \
            --reports-dir support/generated/demo-reports/linux-opengl
        shell: bash

      - name: Linux Vulkan smoke checks
        if: runner.os == 'Linux'
        run: |
          python demos/open-source-porting/run_demo.py \
            --check \
            --run-toolchains \
            --require-toolchain-runs \
            $(python demos/open-source-porting/run_demo.py --emit-case-args vulkan) \
            --target vulkan \
            --reports-dir support/generated/demo-reports/linux-vulkan
        shell: bash

      - name: macOS Metal smoke checks
        if: runner.os == 'macOS'
        run: |
          python demos/open-source-porting/run_demo.py \
            --check \
            --run-toolchains \
            --require-toolchain-runs \
            $(python demos/open-source-porting/run_demo.py --emit-case-args metal) \
            --target metal \
            --reports-dir support/generated/demo-reports/macos-metal
        shell: bash

      - name: macOS Metal compile references
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          out_dir="${RUNNER_TEMP}/demo-metal-air"
          mkdir -p "$out_dir"
          while IFS= read -r shader; do
            output="$(printf '%s' "$shader" | tr '/.' '__').air"
            xcrun -sdk macosx metal -c "$shader" -o "$out_dir/$output"
          done < <(
            python demos/open-source-porting/run_demo.py \
              --emit-artifact-paths metal \
              --artifact-suffix .metal
          )
        shell: bash

      - name: Windows DirectX smoke checks
        if: runner.os == 'Windows'
        run: |
          python demos/open-source-porting/run_demo.py \
            --check \
            --run-toolchains \
            --require-toolchain-runs \
            $(python demos/open-source-porting/run_demo.py --emit-case-args directx) \
            --target directx \
            --reports-dir support/generated/demo-reports/windows-directx
        shell: bash

      - name: Windows DirectX compile references
        if: runner.os == 'Windows'
        run: |
          set -euo pipefail
          out_dir="${RUNNER_TEMP}/demo-directx-dxil"
          mkdir -p "$out_dir"
          compile_hlsl() {
            local shader="$1"
            local entry="$2"
            local profile="$3"
            local output
            output="$(printf '%s_%s_%s' "$shader" "$entry" "$profile" | tr '/.:' '____').dxil"
            dxc -T "$profile" -E "$entry" "$shader" -Fo "$out_dir/$output"
          }
          while read -r shader entry profile; do
            compile_hlsl "$shader" "$entry" "$profile"
          done < <(
            python demos/open-source-porting/run_demo.py \
              --emit-directx-compile-jobs
          )
        shell: bash

      - name: Upload demo reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: demo-reports-${{ matrix.os }}
          path: support/generated/demo-reports
          if-no-files-found: ignore
          retention-days: 30

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  build:
    name: Build and validate distributions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Verify tag belongs to main and matches package version
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          comparison_status="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/compare/${GITHUB_SHA}...main" \
              --jq .status
          )"
          case "$comparison_status" in
            identical|ahead) ;;
            *)
              printf 'Tag commit is not contained in main (status: %s).\n' "$comparison_status" >&2
              exit 1
              ;;
          esac

          # setup-python does not guarantee that setuptools is preinstalled.
          python -m pip install setuptools==75.3.2
          package_version="$(python setup.py --version)"
          test "v${package_version}" = "${GITHUB_REF_NAME}"

      - name: Verify required main CI succeeded
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          required_workflows=(
            full-tests.yml
            backend-tests.yml
            translator-tests.yml
            docs.yml
            examples-test.yml
          )

          for workflow in "${required_workflows[@]}"; do
            run="$(
              gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow "$workflow" \
                --commit "$GITHUB_SHA" \
                --branch main \
                --event push \
                --limit 1 \
                --json conclusion,status,url \
                --jq 'if length == 0 then "" else .[0] | [.status, .conclusion, .url] | @tsv end'
            )"
            if [[ -z "$run" ]]; then
              printf 'No main push run found for %s at %s.\n' "$workflow" "$GITHUB_SHA" >&2
              exit 1
            fi

            IFS=$'\t' read -r status conclusion url <<< "$run"
            if [[ "$status" != completed || "$conclusion" != success ]]; then
              printf '%s has not succeeded for %s: status=%s conclusion=%s %s\n' \
                "$workflow" "$GITHUB_SHA" "$status" "$conclusion" "$url" >&2
              exit 1
            fi
          done

      - name: Install release tooling
        run: python -m pip install build==1.2.2.post1 twine==6.1.0

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-distributions-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-distributions-${{ github.sha }}
          path: dist/

      - name: Publish distributions with repository token
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist/
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-distributions-${{ github.sha }}
          path: dist/

      - name: Extract release notes from changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found && /^---$/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Create or update GitHub Release with distributions
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          title="CrossTL ${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "$title" \
              --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/* \
              --verify-tag \
              --title "$title" \
              --notes-file release-notes.md
          fi

name: MLX Project Porting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MLX_COMMIT: "968d264f2903d578e699c4452a4dbf48633921aa"

on:
  push:
    branches: [main]
    paths:
      - ".github/actions/install-linux-dxc/**"
      - ".github/workflows/mlx-project-porting.yml"
      - "crosstl/**"
      - "demos/integrations/mlx/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/test_ci_workflows.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/actions/install-linux-dxc/**"
      - ".github/workflows/mlx-project-porting.yml"
      - "crosstl/**"
      - "demos/integrations/mlx/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/test_ci_workflows.py"
  schedule:
    - cron: "31 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mlx-metal-porting:
    name: MLX Metal project porting (${{ matrix.os }})
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Checkout CrossTL
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CrossTL
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install Linux SPIR-V tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers spirv-tools vulkan-tools

      - name: Install Linux DXC
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-dxc

      - name: Install Windows DirectX Shader Compiler
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ProgressPreference = "SilentlyContinue"
          $archive = Join-Path $env:RUNNER_TEMP "dxc.zip"
          $dxcRoot = Join-Path $env:RUNNER_TEMP "dxc"
          $dxcUri = "https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602.24/dxc_2026_05_27.zip"
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              Invoke-WebRequest -Uri $dxcUri -OutFile $archive
              break
            } catch {
              if ($attempt -eq 5) {
                throw
              }
              Write-Warning "DXC download failed on attempt $attempt; retrying."
              Start-Sleep -Seconds (10 * $attempt)
            }
          }
          Expand-Archive -Path $archive -DestinationPath $dxcRoot -Force
          $dxc = Get-ChildItem -Path $dxcRoot -Recurse -Filter dxc.exe |
            Where-Object { $_.FullName -match "\\bin\\x64\\dxc.exe$" } |
            Select-Object -First 1
          if ($null -eq $dxc) {
            throw "dxc.exe not found in release archive."
          }
          $dxc.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Linux Vulkan runtime dependency
        if: runner.os == 'Linux'
        run: |
          python -m pip install vulkan==1.3.275.1

      - name: Checkout pinned MLX
        shell: bash
        run: |
          set -euo pipefail
          rm -rf mlx-upstream
          git clone --filter=blob:none --no-checkout https://github.com/ml-explore/mlx.git mlx-upstream
          git -C mlx-upstream sparse-checkout init --cone
          git -C mlx-upstream sparse-checkout set mlx/backend/metal/kernels
          git -C mlx-upstream checkout "$MLX_COMMIT"

      - name: Run MLX project-porting checks
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Linux" ]; then
            vulkaninfo --summary || true
            python demos/integrations/mlx/run_mlx_porting.py \
              --mode reduced-frontier \
              --mlx-root mlx-upstream \
              --require-vulkan-toolchain \
              --require-vulkan-native-runtime
          elif [ "$RUNNER_OS" = "Windows" ]; then
            dxc --version
            python demos/integrations/mlx/run_mlx_porting.py \
              --mode reduced-frontier \
              --mlx-root mlx-upstream \
              --require-directx-toolchain
          else
            python demos/integrations/mlx/run_mlx_porting.py \
              --mode reduced-frontier \
              --mlx-root mlx-upstream
          fi

      - name: Upload MLX project-porting reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-project-porting-${{ matrix.os }}
          path: mlx-upstream/.crosstl-mlx-porting/**
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 14

  mlx-full-corpus-scout:
    name: MLX full-corpus artifact scout
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout CrossTL
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CrossTL
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Checkout pinned MLX
        shell: bash
        run: |
          set -euo pipefail
          rm -rf mlx-upstream
          git clone --filter=blob:none --no-checkout https://github.com/ml-explore/mlx.git mlx-upstream
          git -C mlx-upstream sparse-checkout init --cone
          git -C mlx-upstream sparse-checkout set mlx/backend/metal/kernels
          git -C mlx-upstream checkout "$MLX_COMMIT"

      - name: Run MLX full-corpus artifact scout
        shell: bash
        run: |
          set -euo pipefail
          python demos/integrations/mlx/run_mlx_porting.py \
            --mode full-corpus \
            --mlx-root mlx-upstream \
            --summary mlx-upstream/.crosstl-mlx-porting/full-corpus-summary.json

      - name: Upload MLX full-corpus scout reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-full-corpus-scout
          path: |
            mlx-upstream/.crosstl-mlx-porting/configs/**
            mlx-upstream/.crosstl-mlx-porting/reports/**
            mlx-upstream/.crosstl-mlx-porting/logs/**
            mlx-upstream/.crosstl-mlx-porting/out-full-corpus/**
            mlx-upstream/.crosstl-mlx-porting/full-corpus-summary.json
          if-no-files-found: ignore
          retention-days: 30

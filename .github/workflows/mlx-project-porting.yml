name: MLX Project Porting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MLX_COMMIT: "968d264f2903d578e699c4452a4dbf48633921aa"
  PROJECT_TEMPLATE_MATERIALIZATION_BLOCKERS_ISSUE: "https://github.com/CrossGL/crosstl/issues/1019"
  METAL_NAME_DIRECTIVE_METADATA_ISSUE: "https://github.com/CrossGL/crosstl/issues/1026"
  METAL_SCAN_TEMPLATE_STREAMING_ISSUE: "https://github.com/CrossGL/crosstl/issues/1028"
  METAL_VARIADIC_DEBUG_TEMPLATE_ISSUE: "https://github.com/CrossGL/crosstl/issues/1029"
  METAL_REDUCTION_NORM_TEMPLATE_VARIANTS_ISSUE: "https://github.com/CrossGL/crosstl/issues/1030"
  METAL_CONV_GEMV_TEMPLATE_VARIANTS_ISSUE: "https://github.com/CrossGL/crosstl/issues/1031"
  METAL_ROPE_TEMPLATE_VARIANTS_ISSUE: "https://github.com/CrossGL/crosstl/issues/1032"
  OPENGL_ELEMENTWISE_TEMPLATE_BINDINGS_ISSUE: "https://github.com/CrossGL/crosstl/issues/1033"
  OPENGL_REDUCTION_TEMPLATE_BINDINGS_ISSUE: "https://github.com/CrossGL/crosstl/issues/1034"
  OPENGL_STEEL_TEMPLATE_BINDINGS_ISSUE: "https://github.com/CrossGL/crosstl/issues/1035"
  SPIRV_INDEX_HELPER_PROVENANCE_ISSUE: "https://github.com/CrossGL/crosstl/issues/1036"
  SPIRV_SORT_HELPER_INLINE_ISSUE: "https://github.com/CrossGL/crosstl/issues/1037"
  RUNTIME_BINDING_MANIFEST_ISSUE: "https://github.com/CrossGL/crosstl/issues/1038"
  RUNTIME_PARITY_EXECUTOR_ISSUE: "https://github.com/CrossGL/crosstl/issues/1039"
  OPENGL_QUANTIZED_FFT_TEMPLATE_BINDINGS_ISSUE: "https://github.com/CrossGL/crosstl/issues/1068"

on:
  push:
    branches: [main]
    paths:
      - ".github/actions/install-linux-dxc/**"
      - ".github/workflows/mlx-project-porting.yml"
      - "crosstl/**"
      - "integrations/mlx/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/test_ci_workflows.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/actions/install-linux-dxc/**"
      - ".github/workflows/mlx-project-porting.yml"
      - "crosstl/**"
      - "integrations/mlx/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/test_ci_workflows.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mlx-metal-porting:
    name: MLX Metal project porting (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Checkout CrossTL
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CrossTL
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install Linux SPIR-V tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y spirv-tools

      - name: Install Linux DXC
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-dxc

      - name: Checkout pinned MLX
        shell: bash
        run: |
          set -euo pipefail
          rm -rf mlx-upstream
          git clone --filter=blob:none --no-checkout https://github.com/ml-explore/mlx.git mlx-upstream
          git -C mlx-upstream sparse-checkout init --cone
          git -C mlx-upstream sparse-checkout set mlx/backend/metal/kernels
          git -C mlx-upstream checkout "$MLX_COMMIT"

      - name: Run MLX project-porting checks
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Linux" ]; then
            python integrations/mlx/run_mlx_porting.py \
              --mlx-root mlx-upstream \
              --require-vulkan-toolchain
          else
            python integrations/mlx/run_mlx_porting.py \
              --mlx-root mlx-upstream
          fi

      - name: Upload MLX project-porting reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-project-porting-${{ matrix.os }}
          path: mlx-upstream/.crosstl-mlx-porting/**
          if-no-files-found: ignore
          retention-days: 14

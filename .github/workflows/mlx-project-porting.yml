name: MLX Project Porting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MLX_COMMIT: "968d264f2903d578e699c4452a4dbf48633921aa"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/mlx-project-porting.yml"
      - "crosstl/**"
      - "integrations/mlx/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/test_ci_workflows.py"
      - "tests/test_mlx_porting_harness.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/mlx-project-porting.yml"
      - "crosstl/**"
      - "integrations/mlx/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/test_ci_workflows.py"
      - "tests/test_mlx_porting_harness.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mlx-metal-porting:
    name: MLX Metal project porting (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Checkout CrossTL
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CrossTL
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install Linux shader validators
        if: runner.os == 'Linux'
        run: |
          mapfile -t runner_apt_sources < <(
            grep -rl "packages.microsoft.com" /etc/apt/sources.list.d 2>/dev/null || true
          )

          if ((${#runner_apt_sources[@]})); then
            printf 'Removing optional hosted-runner apt sources before apt update:\n'
            printf '  %s\n' "${runner_apt_sources[@]}"
            sudo rm -f "${runner_apt_sources[@]}"
          fi

          sudo apt-get update
          sudo apt-get install -y glslang-tools spirv-tools

      - name: Install macOS GLSL validator
        if: runner.os == 'macOS'
        run: brew install glslang

      - name: Install Windows DXC
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ProgressPreference = "SilentlyContinue"
          $archive = Join-Path $env:RUNNER_TEMP "dxc.zip"
          $dxcRoot = Join-Path $env:RUNNER_TEMP "dxc"
          $dxcUri = "https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602/dxc_2026_02_20.zip"
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              Invoke-WebRequest -Uri $dxcUri -OutFile $archive
              break
            } catch {
              if ($attempt -eq 5) {
                throw
              }
              Write-Warning "DXC download failed on attempt $attempt; retrying."
              Start-Sleep -Seconds (10 * $attempt)
            }
          }
          Expand-Archive -Path $archive -DestinationPath $dxcRoot -Force
          Join-Path $dxcRoot "bin\x64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Checkout pinned MLX
        shell: bash
        run: |
          set -euo pipefail
          rm -rf mlx-upstream
          git clone --filter=blob:none --no-checkout https://github.com/ml-explore/mlx.git mlx-upstream
          git -C mlx-upstream sparse-checkout init --cone
          git -C mlx-upstream sparse-checkout set mlx/backend/metal/kernels
          git -C mlx-upstream checkout "$MLX_COMMIT"

      - name: Run MLX project-porting checks
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Linux" ]; then
            python integrations/mlx/run_mlx_porting.py \
              --mlx-root mlx-upstream \
              --require-opengl-toolchain \
              --require-vulkan-toolchain
          elif [ "$RUNNER_OS" = "Windows" ]; then
            python integrations/mlx/run_mlx_porting.py \
              --mlx-root mlx-upstream \
              --require-directx-toolchain
          elif [ "$RUNNER_OS" = "macOS" ]; then
            python integrations/mlx/run_mlx_porting.py \
              --mlx-root mlx-upstream \
              --require-opengl-toolchain
          else
            python integrations/mlx/run_mlx_porting.py \
              --mlx-root mlx-upstream
          fi

      - name: Upload MLX project-porting reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-project-porting-${{ matrix.os }}
          path: mlx-upstream/.crosstl-mlx-porting/**
          if-no-files-found: ignore
          retention-days: 14

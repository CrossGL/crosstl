name: MLX Project Porting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MLX_COMMIT: "4367c73b60541ddd5a266ce4644fd93d20223b6e"

on:
  push:
    branches: [main]
    paths:
      - ".github/actions/install-linux-dxc/**"
      - ".github/workflows/mlx-project-porting.yml"
      - "crosstl/**"
      - "demos/integrations/mlx/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/test_ci_workflows.py"
      - "tests/test_mlx_porting_harness.py"
      - "tests/test_translator/test_codegen/test_GLSL_codegen.py"
      - "tests/test_translator/test_codegen/test_SPIRV_codegen.py"
      - "tests/test_translator/test_codegen/test_directx_codegen.py"
      - "tests/fixtures/runtime_verification/**"
      - "tests/fixtures/project_porting/mlx/**"
      - "tests/test_translator/test_native_runtime_drivers.py"
      - "tests/test_translator/test_project_translation.py"
      - "tests/test_translator/test_runtime_verification.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/actions/install-linux-dxc/**"
      - ".github/workflows/mlx-project-porting.yml"
      - "crosstl/**"
      - "demos/integrations/mlx/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/test_ci_workflows.py"
      - "tests/test_mlx_porting_harness.py"
      - "tests/test_translator/test_codegen/test_GLSL_codegen.py"
      - "tests/test_translator/test_codegen/test_SPIRV_codegen.py"
      - "tests/test_translator/test_codegen/test_directx_codegen.py"
      - "tests/fixtures/runtime_verification/**"
      - "tests/fixtures/project_porting/mlx/**"
      - "tests/test_translator/test_native_runtime_drivers.py"
      - "tests/test_translator/test_project_translation.py"
      - "tests/test_translator/test_runtime_verification.py"
  schedule:
    - cron: "31 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mlx-metal-porting:
    name: MLX Metal project porting (${{ matrix.os }})
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Checkout CrossTL
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CrossTL
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install Linux SPIR-V tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools libegl1 libgl1 libgl1-mesa-dri libglx-mesa0 libopengl0 mesa-vulkan-drivers spirv-tools vulkan-tools
          glslangValidator --version

      - name: Install Linux DXC
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-dxc

      - name: Validate OpenGL lowering contracts
        if: runner.os == 'Linux'
        run: |
          python -m pip install pytest
          python -m pytest -q tests/test_translator/test_codegen/test_GLSL_codegen.py \
            -k "opengl_lowers_expected_scalar_and_vector_conversions or opengl_preserves_metal_arithmetic_conversion_order or opengl_helper_parameters_preserve_out_and_inout_qualifiers or glsl_atomic_thread_fence"
          python -m pytest -q tests/test_translator/test_project_translation.py \
            -k "translate_project_reports_unrepresentable_atomic_fence_contract"

      - name: Install Windows DirectX Shader Compiler
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ProgressPreference = "SilentlyContinue"
          $archive = Join-Path $env:RUNNER_TEMP "dxc.zip"
          $dxcRoot = Join-Path $env:RUNNER_TEMP "dxc"
          $dxcUri = "https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.9.2602.24/dxc_2026_05_27.zip"
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              Invoke-WebRequest -Uri $dxcUri -OutFile $archive
              break
            } catch {
              if ($attempt -eq 5) {
                throw
              }
              Write-Warning "DXC download failed on attempt $attempt; retrying."
              Start-Sleep -Seconds (10 * $attempt)
            }
          }
          Expand-Archive -Path $archive -DestinationPath $dxcRoot -Force
          $dxc = Get-ChildItem -Path $dxcRoot -Recurse -Filter dxc.exe |
            Where-Object { $_.FullName -match "\\bin\\x64\\dxc.exe$" } |
            Select-Object -First 1
          if ($null -eq $dxc) {
            throw "dxc.exe not found in release archive."
          }
          $dxc.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Windows Direct3D runtime dependencies
        if: runner.os == 'Windows'
        run: python -m pip install -e ".[directx-runtime]" pytest-xdist

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        run: |
          python -m pip install moderngl==5.12.0 PyOpenGL==3.1.10 pytest-xdist vulkan==1.3.275.1

      - name: Checkout pinned MLX
        shell: bash
        run: |
          set -euo pipefail
          rm -rf mlx-upstream
          git clone --filter=blob:none --no-checkout https://github.com/ml-explore/mlx.git mlx-upstream
          git -C mlx-upstream config core.autocrlf false
          git -C mlx-upstream sparse-checkout init --cone
          git -C mlx-upstream sparse-checkout set mlx/backend/metal/kernels
          git -C mlx-upstream checkout "$MLX_COMMIT"

      - name: Run MLX project-porting checks
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Linux" ]; then
            vulkaninfo --summary || true
            python demos/integrations/mlx/run_mlx_porting.py \
              --mode reduced-frontier \
              --mlx-root mlx-upstream \
              --require-opengl-frontier-toolchain \
              --require-opengl-gemv-toolchain \
              --require-opengl-native-runtime \
              --require-vulkan-gemv-toolchain \
              --require-vulkan-toolchain \
              --require-vulkan-native-runtime
          elif [ "$RUNNER_OS" = "Windows" ]; then
            dxc --version
            python demos/integrations/mlx/run_mlx_porting.py \
              --mode reduced-frontier \
              --mlx-root mlx-upstream \
              --require-directx-toolchain
          else
            python demos/integrations/mlx/run_mlx_porting.py \
              --mode reduced-frontier \
              --mlx-root mlx-upstream \
              --require-metal-toolchain
          fi

      - name: Prove pinned MLX RMSNorm specialization variants
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            python demos/integrations/mlx/prove_rms_norm_specialization.py \
              --mlx-root mlx-upstream \
              --work-dir .crosstl-mlx-porting/rms-norm-specialization \
              --require-directx-toolchain
          elif [ "$RUNNER_OS" = "Linux" ]; then
            python demos/integrations/mlx/prove_rms_norm_specialization.py \
              --mlx-root mlx-upstream \
              --work-dir .crosstl-mlx-porting/rms-norm-specialization \
              --require-opengl-toolchain
          else
            python demos/integrations/mlx/prove_rms_norm_specialization.py \
              --mlx-root mlx-upstream \
              --work-dir .crosstl-mlx-porting/rms-norm-specialization
          fi

      - name: Prove Direct3D immutable lookup numerical execution
        if: runner.os == 'Windows'
        env:
          CROSTL_RUN_DIRECTX_LOOKUP_DEVICE_TEST: "1"
        run: python -m pytest -q -n auto tests/test_translator/test_native_runtime_drivers.py -k "directx_compute_runtime_executes_mlx_file_scope_lookup_on_device"

      - name: Prove translated MLX arange Direct3D numerical execution
        if: runner.os == 'Windows'
        env:
          CROSTL_MLX_ROOT: ${{ github.workspace }}/mlx-upstream
          CROSTL_RUN_DIRECTX_MLX_ARANGE_DEVICE_TEST: "1"
        run: python -m pytest -q -n auto tests/test_translator/test_native_runtime_drivers.py -k "directx_compute_runtime_executes_translated_pinned_mlx_arange_on_device"

      - name: Prove OpenGL SPIR-V specialization runtime
        if: runner.os == 'Linux'
        env:
          CROSTL_RUN_OPENGL_SPIRV_DEVICE_TEST: "1"
          EGL_PLATFORM: surfaceless
          LIBGL_ALWAYS_SOFTWARE: "1"
          PYOPENGL_PLATFORM: egl
        run: |
          python -m pytest -q -n auto \
            tests/test_translator/test_native_runtime_drivers.py \
            -k "opengl_compute_runtime_specializes_generated_spirv_on_device"

      - name: Verify MLX frontier accounting
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from demos.integrations.mlx.run_mlx_porting import (
              MLX_DIRECTX_TOOLCHAIN_ENTRY_POINT_COUNTS,
              MLX_DIRECTX_TOOLCHAIN_FRONTIER_SOURCES,
              MLX_OPENGL_TOOLCHAIN_FRONTIER_SOURCES,
          )

          fence_source = "mlx/backend/metal/kernels/fence.metal"
          fence_issue = "https://github.com/CrossGL/crosstl/issues/1537"
          directx_frontier_sources = set(MLX_DIRECTX_TOOLCHAIN_FRONTIER_SOURCES)
          directx_entry_point_counts = dict(
              MLX_DIRECTX_TOOLCHAIN_ENTRY_POINT_COUNTS
          )
          directx_frontier_count = len(directx_frontier_sources)
          directx_entry_point_count = sum(directx_entry_point_counts.values())
          opengl_frontier_sources = set(MLX_OPENGL_TOOLCHAIN_FRONTIER_SOURCES)
          opengl_frontier_count = len(opengl_frontier_sources)
          required_opengl_promotions = {
              "mlx/backend/metal/kernels/binary_two.metal",
              "mlx/backend/metal/kernels/ternary.metal",
          }
          if not required_opengl_promotions <= opengl_frontier_sources:
              raise SystemExit("required OpenGL frontier promotions are missing")
          if opengl_frontier_count != 8:
              raise SystemExit("expected 8 OpenGL toolchain frontier sources")
          payload = json.loads(
              Path("mlx-upstream/.crosstl-mlx-porting/summary.json").read_text(
                  encoding="utf-8"
              )
          )
          scope = payload["scope"]
          if len(scope["cleanFrontierSources"]) != 11:
              raise SystemExit("expected 11 clean MLX frontier sources")
          if scope["blockedFrontierSources"] != [fence_source]:
              raise SystemExit("fence.metal must be the sole blocked frontier source")
          if scope["blockedFrontierIssues"] != [fence_issue]:
              raise SystemExit("blocked frontier must track issue #1537")
          checks = {check["name"]: check for check in payload["checks"]}
          fence = checks["atomic-fence-contract"]
          if fence["failedArtifactCount"] != 3 or fence["emittedArtifactCount"] != 0:
              raise SystemExit("fence contract accounting must be 3 failed, 0 emitted")
          reference_accessor = checks["reference-accessor-lvalue-identity"]
          expected_directx_required = os.environ["RUNNER_OS"] == "Windows"
          expected_opengl_required = os.environ["RUNNER_OS"] == "Linux"
          if (
              scope["referenceAccessorProofIncluded"] is not True
              or scope["referenceAccessorTargets"] != ["directx", "opengl"]
              or (
                  scope["referenceAccessorDirectxToolchainRequired"]
                  is not expected_directx_required
              )
              or (
                  scope["referenceAccessorOpenglToolchainRequired"]
                  is not expected_opengl_required
              )
              or reference_accessor["proofStatus"] != "verified-original-storage-write"
              or reference_accessor["constReadProofStatus"]
              != "verified-original-storage-const-read"
              or reference_accessor["nestedConstAliasProofStatus"]
              != "verified-original-nested-storage-const-alias-read"
              or reference_accessor["artifactCount"] != 2
              or reference_accessor["projectDiagnosticCount"] != 0
              or reference_accessor["runtimeParityClaimed"] is not False
              or reference_accessor["upstreamMlxRuntimeExecuted"] is not False
          ):
              raise SystemExit("reference accessor proof accounting is incomplete")
          expected_native_target = {
              "Linux": "opengl",
              "Windows": "directx",
          }.get(os.environ["RUNNER_OS"])
          for target in ("directx", "opengl"):
              proof = reference_accessor["targetProofs"][target]
              evidence = proof["writeEvidence"]
              const_read = proof["constReadEvidence"]
              nested_const_alias = proof["nestedConstAliasEvidence"]
              if (
                  evidence["status"] != "verified-original-storage-write"
                  or evidence["storageMember"] != "val_frags"
                  or evidence["readBackFromWrittenLvalue"] is not True
                  or evidence["valueReturningHelperUsedForWrite"] is not False
              ):
                  raise SystemExit(
                      f"reference accessor {target} storage evidence is incomplete"
                  )
              if (
                  const_read["status"]
                  != "verified-original-storage-const-read"
                  or const_read["storageMember"] != "val_frags"
                  or const_read["implicitReceiver"] != "self"
                  or const_read["passedDirectlyToHelper"] is not True
                  or const_read["accessorCallEliminated"] is not True
                  or const_read["kernelPathInvoked"] is not True
              ):
                  raise SystemExit(
                      f"reference accessor {target} const-read evidence is incomplete"
                  )
              if (
                  nested_const_alias["status"]
                  != "verified-original-nested-storage-const-alias-read"
                  or nested_const_alias["storageMember"] != "val_frags"
                  or nested_const_alias["storagePath"]
                  != "self.nestedTile.val_frags"
                  or nested_const_alias["outerReceiver"] != "self"
                  or nested_const_alias["tileMember"] != "nestedTile"
                  or nested_const_alias["fragmentType"] != "float2"
                  or nested_const_alias["aliasName"] != "accum"
                  or nested_const_alias["aliasEliminated"] is not True
                  or nested_const_alias["accessorCallEliminated"] is not True
                  or nested_const_alias["indexedAliasRead"] != "accum[k]"
                  or nested_const_alias["readFromOriginalStorage"] is not True
                  or nested_const_alias["kernelPathInvoked"] is not True
              ):
                  raise SystemExit(
                      f"reference accessor {target} nested const-alias evidence is incomplete"
                  )
              expected_status = (
                  "validated" if target == expected_native_target else "not-required"
              )
              expected_required = expected_status == "validated"
              native_validation = proof["nativeValidation"]
              expected_compiler = {
                  "directx": "dxc",
                  "opengl": "glslangValidator",
              }[target]
              if (
                  native_validation["status"] != expected_status
                  or native_validation["required"] is not expected_required
                  or native_validation["nativeCompiler"] != expected_compiler
                  or (
                      target == "opengl"
                      and native_validation["spirvValidator"] != "spirv-val"
                  )
              ):
                  raise SystemExit(
                      f"reference accessor {target} native validation must be "
                      f"{expected_status} on {os.environ['RUNNER_OS']}"
                  )
          directx = checks["directx-vulkan-frontier"]
          if (
              set(directx["directxToolchainSources"])
              != directx_frontier_sources
              or directx["directxToolchainArtifactCount"]
              != directx_frontier_count
              or directx["directxToolchainExpectedEntryPointCounts"]
              != directx_entry_point_counts
              or directx["directxToolchainExpectedEntryPointCount"]
              != directx_entry_point_count
          ):
              raise SystemExit("DirectX frontier accounting is incomplete")
          if os.environ["RUNNER_OS"] == "Windows":
              if (
                  directx["directxToolchainRequired"] is not True
                  or directx["directxValidationStatus"] != "validated"
                  or directx["directxToolchainValidatedArtifactCount"]
                  != directx_frontier_count
                  or set(directx["directxToolchainValidatedSources"])
                  != directx_frontier_sources
                  or directx["directxToolchainValidatedEntryPointCounts"]
                  != directx_entry_point_counts
                  or directx["directxToolchainValidatedEntryPointCount"]
                  != directx_entry_point_count
                  or directx["toolchainRuns"] != directx_entry_point_count
              ):
                  raise SystemExit(
                      "DirectX frontier toolchain must validate every configured "
                      "source artifact and compute entry"
                  )
          opengl = checks["opengl-frontier"]
          if set(opengl["sources"]) != opengl_frontier_sources:
              raise SystemExit("OpenGL toolchain frontier sources are incomplete")
          if (
              opengl["sourceCount"] != opengl_frontier_count
              or opengl["artifactCount"] != opengl_frontier_count
              or opengl["projectDiagnosticCount"] != 0
          ):
              raise SystemExit(
                  "OpenGL frontier accounting must cover every configured source "
                  "with one artifact and zero project diagnostics"
              )
          if os.environ["RUNNER_OS"] == "Linux":
              validated_sources = set(opengl["toolchainValidatedSources"])
              validation_outputs = set(opengl["nativeValidationOutputs"])
              if (
                  opengl["toolchainRequired"] is not True
                  or opengl["nativeValidationStatus"] != "validated"
                  or opengl["toolchainValidatedArtifactCount"]
                  != opengl_frontier_count
                  or validated_sources != opengl_frontier_sources
                  or validation_outputs != opengl_frontier_sources
              ):
                  raise SystemExit(
                      "OpenGL frontier toolchain must validate every source path"
                  )
          PY

      - name: Upload MLX project-porting reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-project-porting-${{ matrix.os }}
          path: mlx-upstream/.crosstl-mlx-porting/**
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 14

  mlx-full-corpus-scout:
    name: MLX full-corpus artifact scout
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout CrossTL
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CrossTL
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Checkout pinned MLX
        shell: bash
        run: |
          set -euo pipefail
          rm -rf mlx-upstream
          git clone --filter=blob:none --no-checkout https://github.com/ml-explore/mlx.git mlx-upstream
          git -C mlx-upstream sparse-checkout init --cone
          git -C mlx-upstream sparse-checkout set mlx/backend/metal/kernels
          git -C mlx-upstream checkout "$MLX_COMMIT"

      - name: Run MLX full-corpus artifact scout
        shell: bash
        run: |
          set -euo pipefail
          python demos/integrations/mlx/run_mlx_porting.py \
            --mode full-corpus \
            --mlx-root mlx-upstream \
            --summary mlx-upstream/.crosstl-mlx-porting/full-corpus-summary.json

      - name: Upload MLX full-corpus scout reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-full-corpus-scout
          path: |
            mlx-upstream/.crosstl-mlx-porting/configs/**
            mlx-upstream/.crosstl-mlx-porting/reports/**
            mlx-upstream/.crosstl-mlx-porting/logs/**
            mlx-upstream/.crosstl-mlx-porting/out-full-corpus/**
            mlx-upstream/.crosstl-mlx-porting/full-corpus-summary.json
          if-no-files-found: ignore
          retention-days: 30
